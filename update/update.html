
<?php
// Current app version
$currentVersion = "1.0.0";

// URL to check latest version (this could be a JSON file or PHP script on your server)
$updateUrl = "https://yourserver.com/update.json";

// Fetch latest version info
$latestVersion = null;
$downloadLink = null;

$response = @file_get_contents($updateUrl);
if ($response) {
    $data = json_decode($response, true);
    if ($data) {
        $latestVersion = $data['version'];
        $downloadLink = $data['download'];
    }
}
?>

<div class="popup" id="popup">
    <div class="popup-content" id="popup-content">
        <!-- Content injected by JS -->
    </div>
</div>

<script>
function checkUpdate() {
    var current = "<?php echo $currentVersion; ?>";
    var latest = "<?php echo $latestVersion; ?>";
    var link = "<?php echo $downloadLink; ?>";
    var popup = document.getElementById("popup");
    var content = document.getElementById("popup-content");

    if (latest && latest !== current) {
        content.innerHTML = "<h2>Update Available!</h2>" +
                            "<p>Latest version: " + latest + "</p>" +
                            "<a href='" + link + "' target='_blank'>Download Update</a>";
    } else {
        content.innerHTML = "<h2>You are up to date ✅</h2>" +
                            "<p>Current version: " + current + "</p>";
    }
    popup.style.display = "flex";
}

// Close popup when clicking outside
document.getElementById("popup").addEventListener("click", function(e) {
    if (e.target.id === "popup") {
        this.style.display = "none";
    }
});
</script>
</body>
